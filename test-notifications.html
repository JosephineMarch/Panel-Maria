<!DOCTYPE html>
<html>
<head>
    <title>Test Notificaciones KAI</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .step { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        pre { background: #1a1a1a; color: #0f0; padding: 10px; overflow: auto; max-height: 300px; }
    </style>
</head>
<body>
    <h1>🔔 Test Notificaciones KAI</h1>
    
    <button id="runTest">🚀 Ejecutar Test Completo</button>
    <button id="justSend">📤 Solo Enviar (sin regenerar)</button>
    
    <div id="log"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getMessaging, getToken } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyAgsf640E_y-Ry8C6bf5cHMNB7BYjFk6FA",
            authDomain: "panel-de-control-maria.firebaseapp.com",
            projectId: "panel-de-control-maria",
            storageBucket: "panel-de-control-maria.firebasestorage.app",
            messagingSenderId: "434100378252",
            appId: "1:434100378252:web:56c7355bca874a940979a9"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'step ' + type;
            div.innerHTML = msg;
            document.getElementById('log').appendChild(div);
            console.log(msg);
        }

        async function runFullTest() {
            document.getElementById('log').innerHTML = '';
            
            try {
                // 1. Limpiar tokens previos
                log('🧹 Limpiando tokens previos...');
                localStorage.removeItem('fcmToken');
                localStorage.removeItem('fcmTokenTime');
                
                // 2. Revocar permiso anterior (-force re-request)
                if (Notification.permission === 'granted') {
                    log('↩️ Revocando permiso anterior...');
                    const reg = await navigator.serviceWorker.getRegistration();
                    if (reg) await reg.unregister();
                }
                
                // 3. Solicitar permiso nuevo
                log('🔔 Solicitando permiso de notificaciones...');
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    log('❌ Permiso denegado: ' + permission, 'error');
                    return;
                }
                log('✅ Permiso concedido: ' + permission, 'success');
                
                // 4. Registrar Service Worker fresco
                log('📡 Registrando Service Worker fresco...');
                try {
                    const existingRegs = await navigator.serviceWorker.getRegistrations();
                    for (const reg of existingRegs) {
                        if (reg.active?.scriptURL.includes('sw.js')) {
                            await reg.unregister();
                        }
                    }
                } catch(e) {}
                
                const registration = await navigator.serviceWorker.register('./sw.js', { scope: './' });
                await navigator.serviceWorker.ready;
                log('✅ SW registrado', 'success');
                
                // 5. Obtener token NUEVO (siempre nuevo)
                log('🎫 Generando token NUEVO...');
                const token = await getToken(messaging, {
                    vapidKey: 'BCHREiBU8nAuYsdRrXCovUK5a1hCoQGHMAAeITKaWWD8eAg8Urp8_dKPkNv7zSbmJDLJ-nz04Mz3wdN13NV417Q',
                    serviceWorkerRegistration: registration
                });
                
                if (!token) {
                    log('❌ No se pudo obtener token', 'error');
                    return;
                }
                
                log('✅ Token: ' + token.substring(0, 40) + '...', 'success');
                
                // 6. Guardar en localStorage
                localStorage.setItem('fcmToken', token);
                localStorage.setItem('fcmTokenTime', Date.now().toString());
                
                // 7. Enviar notificación de prueba
                log('📤 Enviando notificación de prueba...');
                
                // URL de la Edge Function de Supabase
                const SUPABASE_URL = 'https://jiufptuxadjavjfbfwka.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppdWZwdHV4YWRqYXZqZmJmd2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODY0NzgsImV4cCI6MjA4NTY2MjQ3OH0.LCXYWsmD-ZM45O_HNVwFHu8dJFzxns3Zd_2BHusm2CY';
                
                const response = await fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'apikey': SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        token: token,
                        title: '🔔 Test KAI',
                        body: 'Notificación de prueba - ' + new Date().toLocaleTimeString(),
                        type: 'test',
                        priority: 'normal'
                    })
                });
                
                const result = await response.json();
                log('📬 Respuesta: ' + JSON.stringify(result), response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    log('✅ ¡Notificación enviada! Revisa tu dispositivo.', 'success');
                } else {
                    log('❌ Error: ' + result.error, 'error');
                }
                
            } catch (error) {
                log('❌ Error general: ' + error.message, 'error');
                console.error(error);
            }
        }

        async function justSend() {
            document.getElementById('log').innerHTML = '';
            const token = localStorage.getItem('fcmToken');
            
            if (!token) {
                log('❌ No hay token. Ejecutá el test completo primero.', 'error');
                return;
            }
            
            log('📤 Enviando con token existente...');
            
            const SUPABASE_URL = 'https://jiufptuxadjavjfbfwka.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppdWZwdHV4YWRqYXZqZmJmd2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODY0NzgsImV4cCI6MjA4NTY2MjQ3OH0.LCXYWsmD-ZM45O_HNVwFHu8dJFzxns3Zd_2BHusm2CY';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'apikey': SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        token: token,
                        title: '🔔 Test KAI',
                        body: 'Notificación de prueba - ' + new Date().toLocaleTimeString(),
                        type: 'test',
                        priority: 'normal'
                    })
                });
                
                const result = await response.json();
                log('📬 Respuesta: ' + JSON.stringify(result), response.ok ? 'success' : 'error');
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
            }
        }

        document.getElementById('runTest').addEventListener('click', runFullTest);
        document.getElementById('justSend').addEventListener('click', justSend);
    </script>
</body>
</html>
