<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - KAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    p {
      font-size: 1rem;
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: white;
      color: #4f46e5;
      border: none;
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .tips {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 0.875rem;
    }
    .tips strong { display: block; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>Parece que no tenés internet. Tu progreso se guarda automáticamente y sincronizará cuando vuelvas a conectarte.</p>
    <button onclick="window.location.reload()">Reintentar</button>
    <div class="tips">
      <strong>💡 Tips:</strong>
      <ul style="text-align: left; padding-left: 1.25rem; margin-top: 0.5rem;">
        <li>Verificá que el WiFi esté conectado</li>
        <li>Probá apagando y prendiendo los datos</li>
        <li>Si usás datos móviles, verificá el plan</li>
      </ul>
    </div>
  </div>
</body>
</html>
